<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Мониторинг сетевых устройств</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <header>
      <h1>Мониторинг сетевых устройств</h1>
      <div class="notifications-container">
        <button id="notification-button">⚠️ (0)</button>
        <div id="notification-dropdown" class="hidden"></div>
      </div>
    </header>

    <main>
      <div class="controls">
        <button id="refresh-button">🔄 Перезапустить SNMP-опрос</button>
        <form action="" name="refresh-form">
          <label for="refresh-interval">Интервал обновления (сек):</label>
          <input type="number" id="refresh-interval" min="10" value="10" />

          <button type="submit">Сохранить интервал</button>
        </form>
      </div>

      <div id="loader" class="hidden">Загрузка...</div>
      <div id="device-table"></div>
    </main>

    <script src="./js/script.js"></script>
  </body>
</html>
